# GitHub Actions workflow for LunarUI release
# Uses BigWigsMods packager to build and optionally upload to CurseForge/Wago

name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (e.g., v0.7.0)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # 不取消進行中的 release

permissions:
  contents: write

jobs:
  validate:
    name: Validate before release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install LuaJIT + LuaRocks
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: "luajit-2.1.0-beta3"

      - name: Install LuaRocks binary
        uses: leafo/gh-actions-luarocks@v6

      - name: Install luacheck + busted and configure PATH
        # gh-actions-luarocks@v6 不再支援 rocks 參數，需手動呼叫 luarocks install
        # .luarocks/bin/luarocks 由 gh-actions-luarocks 安裝，使用完整路徑避免 PATH 問題
        run: |
          $GITHUB_WORKSPACE/.luarocks/bin/luarocks install luacheck
          $GITHUB_WORKSPACE/.luarocks/bin/luarocks install busted
          echo "$GITHUB_WORKSPACE/.luarocks/bin" >> $GITHUB_PATH

      - name: Lint with luacheck
        run: luacheck .

      - name: Run unit tests
        run: busted spec/

  release:
    name: Package & Publish
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Package and release addon
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: LunarUI-release
          path: .release/
          retention-days: 30
