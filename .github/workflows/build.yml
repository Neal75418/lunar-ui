# GitHub Actions workflow for LunarUI build validation
# Runs on every push to main and pull requests

name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  STYLUA_VERSION: "2.0.2"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate TOC files
        run: |
          echo "Validating TOC files..."
          for toc in $(find . -name "*.toc" -not -path "./*/Libs/*"); do
            echo "Checking $toc"
            if ! grep -q "## Interface:" "$toc"; then
              echo "ERROR: Missing Interface in $toc"
              exit 1
            fi
            if ! grep -q "## Title:" "$toc"; then
              echo "ERROR: Missing Title in $toc"
              exit 1
            fi
          done
          echo "All TOC files valid!"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks

      - name: Cache luarocks packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.luarocks
            /usr/local/lib/luarocks
            /usr/local/share/lua
            /usr/local/bin/luacheck
            /usr/local/bin/busted
            /usr/local/bin/luacov
          key: luarocks-${{ runner.os }}-${{ hashFiles('.busted', '.luacheckrc') }}
          restore-keys: luarocks-${{ runner.os }}-

      - name: Install luarocks packages
        run: |
          command -v luacheck || sudo luarocks install luacheck
          command -v busted || sudo luarocks install busted
          luarocks show luacov > /dev/null 2>&1 || sudo luarocks install luacov

      - name: Lint with luacheck
        run: luacheck .

      - name: Run unit tests with coverage
        run: |
          busted --coverage spec/
          luacov
          echo "=== Coverage Summary ==="
          tail -30 luacov.report.out || true
          chmod +x scripts/check-coverage.sh
          ./scripts/check-coverage.sh 43

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: luacov.report.out
          retention-days: 14

      - name: Cache StyLua
        id: cache-stylua
        uses: actions/cache@v4
        with:
          path: ./stylua
          key: stylua-${{ runner.os }}-v${{ env.STYLUA_VERSION }}

      - name: Check formatting with StyLua
        run: |
          if [ ! -f ./stylua ]; then
            curl -sSL "https://github.com/JohnnyMorganz/StyLua/releases/download/v${STYLUA_VERSION}/stylua-linux-x86_64.zip" -o stylua.zip
            unzip -q stylua.zip
            chmod +x stylua
          fi
          ./stylua --check --glob '**/*.lua' --glob '!LunarUI/Libs/**' .

      - name: Lint locale key parity
        run: |
          chmod +x scripts/check-locale-keys.sh
          ./scripts/check-locale-keys.sh

      - name: Package addon (dry run)
        id: package
        uses: BigWigsMods/packager@v2
        continue-on-error: true
        with:
          args: -d -z

      - name: Warn if packaging failed
        if: steps.package.outcome == 'failure'
        run: echo "::warning::Addon packaging dry-run failed — check externals"
