# GitHub Actions workflow for LunarUI build validation
# Runs on every push to main and pull requests

name: Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".editorconfig"
      - ".luarc.json"
      - "LICENSE"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".editorconfig"
      - ".luarc.json"
      - "LICENSE"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  STYLUA_VERSION: "2.0.2"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate TOC files
        run: |
          echo "Validating TOC files..."
          for toc in $(find . -name "*.toc" -not -path "./*/Libs/*"); do
            echo "Checking $toc"
            if ! grep -q "## Interface:" "$toc"; then
              echo "ERROR: Missing Interface in $toc"
              exit 1
            fi
            if ! grep -q "## Title:" "$toc"; then
              echo "ERROR: Missing Title in $toc"
              exit 1
            fi
          done
          echo "All TOC files valid!"

      - name: Install LuaJIT + LuaRocks
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: "luajit-2.1.0-beta3"

      - name: Install LuaRocks binary
        uses: leafo/gh-actions-luarocks@v6

      - name: Install luacheck and configure PATH
        # gh-actions-luarocks@v6 不再支援 rocks 參數，需手動呼叫 luarocks install
        # .luarocks/bin/luarocks 由 gh-actions-luarocks 安裝，使用完整路徑避免 PATH 問題
        run: |
          $GITHUB_WORKSPACE/.luarocks/bin/luarocks install luacheck
          echo "$GITHUB_WORKSPACE/.luarocks/bin" >> $GITHUB_PATH

      - name: Lint with luacheck
        run: luacheck .

      - name: Cache StyLua
        uses: actions/cache@v5
        with:
          path: ./stylua
          key: stylua-${{ runner.os }}-v${{ env.STYLUA_VERSION }}

      - name: Check formatting with StyLua
        run: |
          if [ ! -f ./stylua ]; then
            curl -sSL "https://github.com/JohnnyMorganz/StyLua/releases/download/v${STYLUA_VERSION}/stylua-linux-x86_64.zip" -o stylua.zip
            unzip -q stylua.zip
            chmod +x stylua
          fi
          ./stylua --check --glob '**/*.lua' --glob '!LunarUI/Libs/**' --glob '!.lua/**' --glob '!.luarocks/**' .

      - name: Lint locale key parity
        run: ./scripts/check-locale-keys.sh

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install LuaJIT + LuaRocks
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: "luajit-2.1.0-beta3"

      - name: Install LuaRocks binary
        uses: leafo/gh-actions-luarocks@v6

      - name: Install test tools and configure PATH
        # gh-actions-luarocks@v6 不再支援 rocks 參數，需手動呼叫 luarocks install
        # .luarocks/bin/luarocks 由 gh-actions-luarocks 安裝，使用完整路徑避免 PATH 問題
        run: |
          $GITHUB_WORKSPACE/.luarocks/bin/luarocks install busted
          $GITHUB_WORKSPACE/.luarocks/bin/luarocks install luacov
          echo "$GITHUB_WORKSPACE/.luarocks/bin" >> $GITHUB_PATH

      - name: Run unit tests with coverage
        run: |
          busted --coverage spec/
          luacov
          echo "=== Coverage Summary ==="
          tail -30 luacov.report.out || true
          ./scripts/check-coverage.sh 43

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: luacov.report.out
          retention-days: 14

  package:
    name: Package (dry run)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Package addon (dry run)
        id: package
        uses: BigWigsMods/packager@v2
        continue-on-error: true
        with:
          args: -d -z

      - name: Warn if packaging failed
        if: steps.package.outcome == 'failure'
        run: echo "::warning::Addon packaging dry-run failed — check externals"
